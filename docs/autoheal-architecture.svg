<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#15803d"/>
    </marker>
    <style>
      .t{fill:#1a1a2e;font-size:14px}
      .ttl{fill:#0f172a;font-size:15px;font-weight:700}
      .sub{fill:#64748b;font-size:12px}
      .lbl{fill:#475569;font-size:12px;font-weight:600}
      .pill{fill:#eef2ff;stroke:#c7d2fe}
      .step{font-size:11px;fill:#475569}
      .url{font-size:12px;fill:#1d4ed8;font-weight:600;font-family:ui-monospace,Menlo,monospace}
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="42" class="ttl" font-size="22">College Portal — Self-Healing Ops Pipeline</text>
  <text x="40" y="64" class="sub" font-size="13">detect → fix → report · every fix is a human-gated pull request · the agent never pushes to main, never touches auth / payments / grades / migrations</text>

  <!-- ===== ROW 1: DETECT ===== -->
  <text x="40" y="104" class="lbl" fill="#b45309">① DETECT</text>

  <!-- Sentry -->
  <g>
    <rect x="40" y="116" width="170" height="86" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="125" y="146" text-anchor="middle" class="ttl">Sentry</text>
    <text x="125" y="167" text-anchor="middle" class="sub">production error / fatal</text>
    <text x="125" y="186" text-anchor="middle" class="sub">issue-alert rule fires</text>
  </g>

  <!-- Webhook dispatcher -->
  <g>
    <rect x="270" y="100" width="300" height="118" rx="12" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="420" y="126" text-anchor="middle" class="ttl">SentryWebhookController</text>
    <text x="420" y="146" text-anchor="middle" class="url">POST /api/webhooks/sentry</text>
    <text x="288" y="170" class="step">• verify HMAC-SHA256 signature</text>
    <text x="288" y="188" class="step">• gate: env=production, level=error/fatal</text>
    <text x="288" y="206" class="step">• scrub PII · dedup · pick labels</text>
  </g>

  <!-- GitHub issue -->
  <g>
    <rect x="640" y="116" width="200" height="86" rx="12" fill="#f1f5f9" stroke="#64748b"/>
    <text x="740" y="142" text-anchor="middle" class="ttl">GitHub Issue</text>
    <text x="740" y="163" text-anchor="middle" class="sub">label: auto-fix</text>
    <text x="740" y="181" text-anchor="middle" class="sub">severity:error/fatal</text>
    <text x="740" y="197" text-anchor="middle" class="sub">+ needs-human (if sensitive)</text>
  </g>

  <line x1="210" y1="159" x2="268" y2="159" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="159" x2="638" y2="159" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ROW 2: FIX ===== -->
  <text x="40" y="268" class="lbl" fill="#6d28d9">② FIX  (.github/workflows/auto-fix.yml)</text>

  <g>
    <rect x="640" y="280" width="200" height="150" rx="12" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="740" y="306" text-anchor="middle" class="ttl">Claude Code</text>
    <text x="740" y="324" text-anchor="middle" class="sub">(GitHub Action runner)</text>
    <text x="656" y="350" class="step">• Sentry MCP → stack trace</text>
    <text x="656" y="368" class="step">• smallest root-cause fix</text>
    <text x="656" y="386" class="step">• add PHPUnit test</text>
    <text x="656" y="404" class="step">• Pint --test + artisan test</text>
    <text x="656" y="422" class="step">• obeys AUTOFIX_POLICY.md</text>
  </g>

  <!-- arrow issue -> claude (down) -->
  <line x1="740" y1="202" x2="740" y2="278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="752" y="245" class="step">issue labeled → workflow triggers</text>

  <!-- PR -->
  <g>
    <rect x="380" y="300" width="210" height="110" rx="12" fill="#ecfdf5" stroke="#10b981"/>
    <text x="485" y="328" text-anchor="middle" class="ttl">Pull Request</text>
    <text x="485" y="349" text-anchor="middle" class="sub">branch autofix/issue-N</text>
    <text x="485" y="369" text-anchor="middle" class="sub">plain-English explanation</text>
    <text x="485" y="389" text-anchor="middle" class="sub">closes the issue · never main</text>
  </g>
  <line x1="638" y1="355" x2="592" y2="355" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human gate -->
  <g>
    <rect x="120" y="300" width="190" height="110" rx="12" fill="#fff1f2" stroke="#e11d48"/>
    <text x="215" y="330" text-anchor="middle" class="ttl" fill="#9f1239">Human review</text>
    <text x="215" y="352" text-anchor="middle" class="sub">you read the diff</text>
    <text x="215" y="372" text-anchor="middle" class="sub">you merge (or not)</text>
    <text x="215" y="392" text-anchor="middle" class="sub">no auto-merge</text>
  </g>
  <line x1="378" y1="355" x2="312" y2="355" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="318" y="430" class="step" fill="#9f1239" font-weight="700">★ the gate: agent proposes, you dispose</text>

  <!-- ===== ROW 3: REPORT ===== -->
  <text x="40" y="500" class="lbl" fill="#15803d">③ REPORT</text>

  <!-- deploy -->
  <g>
    <rect x="120" y="512" width="190" height="92" rx="12" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="215" y="542" text-anchor="middle" class="ttl">Laravel Cloud</text>
    <text x="215" y="563" text-anchor="middle" class="sub">auto-deploys on</text>
    <text x="215" y="581" text-anchor="middle" class="sub">push to main</text>
  </g>
  <line x1="215" y1="412" x2="215" y2="510" stroke="#15803d" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="225" y="465" class="step" fill="#15803d">merge → deploy</text>

  <!-- incident-report workflow -->
  <g>
    <rect x="360" y="506" width="240" height="104" rx="12" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="480" y="532" text-anchor="middle" class="ttl">incident-report.yml</text>
    <text x="480" y="552" text-anchor="middle" class="sub">on autofix/* PR merged →</text>
    <text x="480" y="572" text-anchor="middle" class="url">POST /api/ops/incident-report</text>
    <text x="480" y="592" text-anchor="middle" class="sub">X-Ops-Secret shared secret</text>
  </g>
  <line x1="310" y1="558" x2="358" y2="558" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- app sends mail -->
  <g>
    <rect x="650" y="506" width="220" height="104" rx="12" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="760" y="532" text-anchor="middle" class="ttl">Deployed app</text>
    <text x="760" y="552" text-anchor="middle" class="sub">SendIncidentReport →</text>
    <text x="760" y="572" text-anchor="middle" class="sub">Claude rewrites PR in</text>
    <text x="760" y="592" text-anchor="middle" class="sub">plain English (native Mail)</text>
  </g>
  <line x1="600" y1="558" x2="648" y2="558" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- email -->
  <g>
    <rect x="910" y="506" width="220" height="104" rx="12" fill="#fef9c3" stroke="#eab308"/>
    <text x="1020" y="540" text-anchor="middle" class="ttl">📧 Administrator</text>
    <text x="1020" y="563" text-anchor="middle" class="sub">"an issue was detected</text>
    <text x="1020" y="581" text-anchor="middle" class="sub">and fixed" report</text>
  </g>
  <line x1="870" y1="558" x2="908" y2="558" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Daily heartbeat lane ===== -->
  <rect x="40" y="648" width="1090" height="86" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="5 4"/>
  <text x="58" y="676" class="lbl">DAILY HEARTBEAT (independent)</text>
  <g>
    <rect x="58" y="686" width="180" height="34" rx="8" class="pill"/>
    <text x="148" y="708" text-anchor="middle" class="t" font-size="12">Cloud Scheduler 07:00</text>
  </g>
  <text x="246" y="708" class="step">→</text>
  <g>
    <rect x="262" y="686" width="170" height="34" rx="8" class="pill"/>
    <text x="347" y="708" text-anchor="middle" class="t" font-size="12">report:daily command</text>
  </g>
  <text x="440" y="708" class="step">→ checks</text>
  <g>
    <rect x="500" y="686" width="150" height="34" rx="8" class="pill"/>
    <text x="575" y="705" text-anchor="middle" class="url" font-size="11">GET /api/health</text>
  </g>
  <text x="658" y="708" class="step">+ last-24h auto-fix activity →</text>
  <g>
    <rect x="880" y="686" width="250" height="34" rx="8" fill="#fef9c3" stroke="#eab308"/>
    <text x="1005" y="708" text-anchor="middle" class="t" font-size="12">📧 daily "all clear" / status</text>
  </g>

  <!-- guardrail footnote -->
  <text x="40" y="754" class="sub" font-size="11">Guardrails: PII scrubbed at every hop (issue, log, email) · config reads env only, no secrets in repo · sensitive areas (auth/grade/payment/migration) force needs-human + human merge, always.</text>
</svg>
